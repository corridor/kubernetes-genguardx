# Primary API and web workload.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: corridor-app
  labels:
    app.kubernetes.io/component: app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: corridor-app
  template:
    metadata:
      labels:
        app: corridor-app
    spec:
      imagePullSecrets:
        - name: registry-secret
      initContainers:
        - name: init-corridor-app
          image: corridor-image
          imagePullPolicy: Always
          command: ["/bin/bash", "-ec"]
          args:
            - |
              echo "Starting database upgrade..."
              /opt/corridor/venv/bin/corridor-api db upgrade
              mv /opt/corridor/corridor*.db* /opt/corridor/databases/ || true
          volumeMounts:
            - name: config-volume
              mountPath: /opt/corridor/config
            - name: data-volume
              mountPath: /opt/corridor/data
            - name: uploads-volume
              mountPath: /opt/corridor/uploads
            - name: databases-volume
              mountPath: /opt/corridor/databases
      containers:
        - name: corridor-app
          image: corridor-image
          imagePullPolicy: Always
          command: ["/bin/bash", "-ec"]
          args:
            - |
              mkdir -p /opt/corridor/data /opt/corridor/uploads /opt/corridor/databases
              cd /opt/corridor
              source venv/bin/activate
              exec venv/bin/corridor-api run
          ports:
            - containerPort: 5002
          volumeMounts:
            - name: config-volume
              mountPath: /opt/corridor/config
            - name: data-volume
              mountPath: /opt/corridor/data
            - name: uploads-volume
              mountPath: /opt/corridor/uploads
            - name: databases-volume
              mountPath: /opt/corridor/databases
          livenessProbe:
            httpGet:
              path: /api
              port: 5002
            initialDelaySeconds: 90
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 10
          readinessProbe:
            httpGet:
              path: /api
              port: 5002
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              memory: "3Gi"
            limits:
              memory: "6Gi"
      volumes:
        - name: config-volume
          configMap:
            name: corridor-app-config
        - name: data-volume
          persistentVolumeClaim:
            claimName: data-pvc
        - name: uploads-volume
          persistentVolumeClaim:
            claimName: uploads-pvc
        - name: databases-volume
          persistentVolumeClaim:
            claimName: databases-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: corridor-app-service
spec:
  type: ClusterIP
  selector:
    app: corridor-app
  ports:
    - port: 5002
      targetPort: 5002
