# Background worker workload.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: corridor-worker
  labels:
    app.kubernetes.io/component: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: corridor-worker
  template:
    metadata:
      labels:
        app: corridor-worker
    spec:
      imagePullSecrets:
        - name: registry-secret
      containers:
        - name: corridor-worker
          image: corridor-image
          imagePullPolicy: Always
          command: ["/bin/bash", "-ec"]
          args:
            - |
              mkdir -p /opt/corridor/data /opt/corridor/uploads
              cd /opt/corridor
              source venv/bin/activate
              exec venv/bin/corridor-worker run
          env:
            - name: WORKER_READINESS_PROBE_FILE
              value: /tmp/celery_ready
            - name: CORRIDOR_API_URL
              value: http://corridor-app-service:5002
          volumeMounts:
            - name: config-volume
              mountPath: /opt/corridor/config
            - name: data-volume
              mountPath: /opt/corridor/data
            - name: uploads-volume
              mountPath: /opt/corridor/uploads
            - name: databases-volume
              mountPath: /opt/corridor/databases
          resources:
            requests:
              memory: "4Gi"
            limits:
              memory: "10Gi"
          readinessProbe:
            exec:
              command:
                - test
                - -f
                - /tmp/celery_ready
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: config-volume
          configMap:
            name: corridor-worker-config
        - name: data-volume
          persistentVolumeClaim:
            claimName: data-pvc
        - name: uploads-volume
          persistentVolumeClaim:
            claimName: uploads-pvc
        - name: databases-volume
          persistentVolumeClaim:
            claimName: databases-pvc
